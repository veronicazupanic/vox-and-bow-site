<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vox & bow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    :root {
      --gap: 2rem;
    }
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: #333;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Ubuntu, 'Helvetica Neue', sans-serif;
      line-height: 1.6;
    }
    .container {
      /* full-screen grid to orbit sections around the central logo */
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      grid-template-rows: 1fr auto 1fr;
      grid-template-areas:
        ". about ."
        ". logo links"
        ". video .";
      gap: var(--gap);
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--gap);
      justify-items: center;
      align-items: center;
    }
    .about {
      grid-area: about;
      justify-self: center;
      text-align: center;
    }
    .logo {
      grid-area: logo;
      max-width: 100%;
      height: auto;
      justify-self: center;
      align-self: center;
    }
    .links {
      grid-area: links;
      justify-self: end;
      align-self: center;
      text-align: right;
    }
    .video {
      grid-area: video;
      justify-self: center;
      text-align: center;
    }
    h2 {
      margin: 0 0 1rem 0;
      font-size: 1.75rem;
      font-weight: 600;
    }
    .links ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .links li + li {
      margin-top: 0.5rem;
    }
    .links a {
      color: #007acc;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }
    .links a:hover {
      border-color: #007acc;
    }
    .video iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border: none;
    }
    @media (max-width: 768px) {
      .container {
        display: flex;
        flex-direction: column;
        gap: var(--gap);
        /* allow full height scroll on mobile */
        height: auto;
      }
      .logo {
        margin: 0 auto;
      }
      .links {
        justify-self: center;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="about">
      <h2>About</h2>
      <p>vox & bow is a Toronto-based duo composed of vocalist Lindsay McIntyre and violinist Veronica Zupanic focused on cutting edge contemporary and classical performance.</p>
    </div>
    <img src="./logo.jpeg" alt="Vox & Bow Logo" class="logo">
    <div class="links">
      <h2>Links</h2>
      <ul>
        <li><a href="#" target="_blank" rel="noopener">Instagram</a></li>
        <li><a href="mailto:email@example.com">Email</a></li>
        <li><a href="./press-kit.pdf" target="_blank" rel="noopener">Press Kit (PDF)</a></li>
        <li><a href="#" target="_blank" rel="noopener">SoundCloud</a></li>
      </ul>
    </div>
    <div class="video">
      <iframe
        src="https://www.youtube-nocookie.com/embed/kukgkaB9WzA?rel=0"
        title="Vox & Bow YouTube Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>
