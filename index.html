<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vox & bow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: #333;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Ubuntu, 'Helvetica Neue', sans-serif;
      line-height: 1.6;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    .logo {
      display: block;
      max-width: 300px;
      height: auto;
      margin: 0;
      /* positioned via grid */
    }
    /* Grid layout to center logo and position sections around */
    .grid {
      display: grid;
      grid-template-areas:
        "bio logo links"
        "video logo performances";
      grid-template-columns: 1fr auto 1fr;
      grid-template-rows: auto auto;
      gap: 40px;
      justify-items: center;
      align-items: start;
    }
    .bio {
      grid-area: bio;
      text-align: left;
    }
    .links {
      grid-area: links;
      text-align: left;
    }
    .video {
      grid-area: video;
    }
    .performances {
      grid-area: performances;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.5rem;
    }
    .links ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .links li {
      margin-bottom: 10px;
    }
    .links a {
      text-decoration: none;
      color: #007acc;
      transition: text-decoration 0.3s;
    }
    .links a:hover {
      text-decoration: underline;
    }
    @media (max-width: 600px) {
      .logo {
        margin-bottom: 20px;
      }
    }
    .performances,
    .video {
      margin-top: 40px;
      text-align: center;
    }
    .performances iframe,
    .video iframe {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="grid">
      <div class="bio">
        <h2>About</h2>
        <p>vox & bow is a Toronto-based duo composed of vocalist Lindsay McIntyre and violinist Veronica Zupanic focused on cutting edge contemporary and classical performance.</p>
      </div>
      <div class="links">
        <h2>Links</h2>
        <ul>
          <li><a href="#" target="_blank" rel="noopener">Instagram</a></li>
          <li><a href="mailto:email@example.com">Email</a></li>
          <li><a href="./press-kit.pdf" target="_blank" rel="noopener">Press Kit (PDF)</a></li>
          <li><a href="#" target="_blank" rel="noopener">SoundCloud</a></li>
        </ul>
      </div>

    <section class="performances">
      <h2>Upcoming Performances</h2>
    </section>

    <section class="video">
      <iframe width="560" height="315"
        src="https://www.youtube-nocookie.com/embed/kukgkaB9WzA?rel=0"
        title="Vox & Bow YouTube Video"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </section>
      <img src="./logo.jpeg" alt="Vox & Bow Logo" class="logo">
    </div>
  </div>
</body>
</html>
