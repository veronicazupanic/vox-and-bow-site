<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vox & bow</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather&display=swap" rel="stylesheet">
  <style>
    :root {
      --gap: 2rem;
    }
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: #333;
      font-family: 'Merriweather', serif;
      line-height: 1.6;
      text-transform: lowercase;
    }
    /* Simplified vertical layout */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: var(--gap);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--gap);
    }
    .logo {
      width: 150px;
      height: auto;
      margin: var(--gap) 0;
    }
    .about,
    .links,
    .video {
      width: 100%;
      max-width: 800px;
      text-align: center;
    }
    .links ul {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    h2 {
      margin: 0 0 1rem 0;
      font-size: 1.75rem;
      font-weight: 600;
    }
    /* List-style and spacing handled above in .links ul */
    .links a {
      color: #007acc;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }
    .links a:hover {
      border-color: #007acc;
    }
    .video iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border: none;
    }
    /* Responsive adjustments are inherent with flex and fluid widths */
  </style>
</head>
<body>
  <div class="container">
    <div class="about">
      <p>vox & bow is a Toronto-based duo composed of vocalist Lindsay McIntyre and violinist Veronica Zupanic focused on cutting edge contemporary and classical performance.</p>
    </div>
    <img src="logo.jpeg" alt="Vox & Bow Logo" class="logo">
    <div class="links">
      <ul>
        <li><a href="#" target="_blank" rel="noopener">instagram</a></li>
        <li><a href="mailto:email@example.com">email</a></li>
        <li><a href="https://www.youtube.com/watch?v=kukgkaB9WzA" target="_blank" rel="noopener">youtube</a></li>
      </ul>
    </div>
    <div class="video">
      <iframe
        src="https://www.youtube-nocookie.com/embed/kukgkaB9WzA?rel=0"
        title="Vox & Bow YouTube Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>
