<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vox & bow</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    :root {
      --gap: 2rem;
    }
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: #333;
      font-family: 'Special Elite', serif;
      line-height: 1.6;
      text-transform: lowercase;
    }
    /* Center container and orbit sections around central logo on desktop */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      position: relative;
      width: 90vw;
      max-width: 1000px;
      height: 80vh;
      max-height: 800px;
    }
    .about {
      position: absolute;
      top: var(--gap);
      left: 50%;
      transform: translateX(-50%);
      width: 40%;
      text-align: center;
    }
    .logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20%;
      max-width: 200px;
      height: auto;
    }
    .links {
      position: absolute;
      top: 50%;
      right: var(--gap);
      transform: translateY(-50%);
      width: 20%;
      text-align: right;
    }
    .video {
      position: absolute;
      bottom: var(--gap);
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      text-align: center;
    }
    h2 {
      margin: 0 0 1rem 0;
      font-size: 1.75rem;
      font-weight: 600;
    }
    .links ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .links li + li {
      margin-top: 0.5rem;
    }
    .links a {
      color: #007acc;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }
    .links a:hover {
      border-color: #007acc;
    }
    .video iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border: none;
    }
    @media (max-width: 768px) {
      /* Mobile: static stacking */
      body {
        display: block;
      }
      .container {
        position: static;
        width: auto;
        height: auto;
        display: flex;
        flex-direction: column;
        gap: var(--gap);
        padding: var(--gap);
      }
      .about,
      .logo,
      .links,
      .video {
        position: static;
        transform: none;
        width: auto;
        text-align: left;
        margin-bottom: var(--gap);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="about">
      <p>vox & bow is a Toronto-based duo composed of vocalist Lindsay McIntyre and violinist Veronica Zupanic focused on cutting edge contemporary and classical performance.</p>
    </div>
    <img src="./logo.jpeg" alt="Vox & Bow Logo" class="logo">
    <div class="links">
      <ul>
        <li><a href="#" target="_blank" rel="noopener">instagram</a></li>
        <li><a href="mailto:email@example.com">email</a></li>
        <li><a href="https://www.youtube.com/watch?v=kukgkaB9WzA" target="_blank" rel="noopener">youtube</a></li>
      </ul>
    </div>
    <div class="video">
      <iframe
        src="https://www.youtube-nocookie.com/embed/kukgkaB9WzA?rel=0"
        title="Vox & Bow YouTube Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>
