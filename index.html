<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vox & bow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gap: 2rem;
    }
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: #333;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      line-height: 1.6;
      text-transform: lowercase;
    }
    /* Asymmetrical grid layout */
    .container {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto auto;
      grid-template-areas:
        "about logo"
        ". links"
        "video video";
      gap: var(--gap);
      max-width: 1000px;
      margin: 0 auto;
      padding: var(--gap);
      align-items: start;
    }
    .about {
      grid-area: about;
      max-width: 40ch;
      text-align: left;
    }
    .logo {
      grid-area: logo;
      justify-self: center;
      width: 200px;
      height: auto;
      margin-top: var(--gap);
    }
    .links {
      grid-area: links;
      justify-self: end;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      text-align: right;
    }
    .links a {
      color: #007acc;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }
    .links a:hover {
      border-color: #007acc;
    }
    .video {
      grid-area: video;
      margin-top: calc(var(--gap) * 1.5);
      justify-self: center;
    }
    .video iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="about">
      <p>vox & bow is a Toronto-based duo composed of vocalist Lindsay McIntyre and violinist Veronica Zupanic focused on cutting edge contemporary and classical performance.</p>
    </div>
    <img src="logo.jpeg" alt="Vox & Bow Logo" class="logo">
    <div class="links">
      <ul>
        <li><a href="https://www.instagram.com/voxandbow/" target="_blank" rel="noopener">instagram</a></li>
        <li><a href="mailto:voxandbow@gmail.com">email</a></li>
        <li><a href="https://www.youtube.com/@voxandbow" target="_blank" rel="noopener">youtube</a></li>
      </ul>
    </div>
    <div class="video">
      <iframe
        src="https://www.youtube-nocookie.com/embed/kukgkaB9WzA?rel=0"
        title="Vox & Bow YouTube Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>
