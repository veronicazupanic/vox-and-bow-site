<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vox & bow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    :root {
      --phi: 1.618;
      --gap: 2rem;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: #333;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Ubuntu, 'Helvetica Neue', sans-serif;
      line-height: 1.6;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--gap);
    }
    .top {
      display: grid;
      grid-template-columns: var(--phi)fr 1fr;
      grid-template-rows: auto auto;
      grid-template-areas:
        "about logo"
        "about links";
      gap: var(--gap);
      align-items: start;
    }
    .about {
      grid-area: about;
    }
    .logo {
      grid-area: logo;
      max-width: 100%;
      height: auto;
      align-self: start;
      justify-self: center;
    }
    .links {
      grid-area: links;
    }
    .video {
      margin-top: calc(var(--gap) * 2);
    }
    h2 {
      margin: 0 0 1rem 0;
      font-size: 1.75rem;
      font-weight: 600;
    }
    .links ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .links li + li {
      margin-top: 0.5rem;
    }
    .links a {
      color: #007acc;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }
    .links a:hover {
      border-color: #007acc;
    }
    .video iframe {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      display: block;
      border: none;
    }
    @media (max-width: 768px) {
      .top {
        display: flex;
        flex-direction: column;
      }
      .logo {
        margin: var(--gap) auto 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div class="about">
        <h2>About</h2>
        <p>vox & bow is a Toronto-based duo composed of vocalist Lindsay McIntyre and violinist Veronica Zupanic focused on cutting edge contemporary and classical performance.</p>
      </div>
      <img src="./logo.jpeg" alt="Vox & Bow Logo" class="logo">
      <div class="links">
        <h2>Links</h2>
        <ul>
          <li><a href="#" target="_blank" rel="noopener">Instagram</a></li>
          <li><a href="mailto:email@example.com">Email</a></li>
          <li><a href="./press-kit.pdf" target="_blank" rel="noopener">Press Kit (PDF)</a></li>
          <li><a href="#" target="_blank" rel="noopener">SoundCloud</a></li>
        </ul>
      </div>
    </div>
    <div class="video">
      <iframe
        src="https://www.youtube-nocookie.com/embed/kukgkaB9WzA?rel=0"
        title="Vox & Bow YouTube Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>
